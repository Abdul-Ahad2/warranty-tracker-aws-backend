service: warrantor-backend

useDotenv: true

build:
  esbuild:
    bundle: true
    minify: true

package:
  individually: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  httpApi:
    cors: true
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.us-east-1.amazonaws.com/${env:COGNITO_USER_POOL_ID}
        audience:
          - ${env:COGNITO_CLIENT_ID}

  environment:
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    S3_BUCKET_NAME: warrantor-uploads-${sls:stage}-${aws:accountId}
    AWS_ACCOUNT_ID: ${aws:accountId}
    SCHEDULER_ROLE_ARN: arn:aws:iam::${aws:accountId}:role/warrantor-scheduler-role-${sls:stage}
    SES_DOMAIN: ${env:SES_DOMAIN}
    SLS_STAGE: ${sls:stage}

  iam:
    role:
      statements:
        - Effect: "Allow"
          Action:
            - "dynamodb:PutItem"
            - "dynamodb:Query"
            - "dynamodb:GetItem"
            - "dynamodb:UpdateItem"
            - "dynamodb:DeleteItem"
          Resource: 
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/warranties"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/warranties/index/*"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/notifications"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/notifications/index/*"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/settings"

        - Effect: "Allow"
          Action:
            - "cognito-idp:AdminGetUser"
            - "cognito-idp:AdminUpdateUserAttributes"
            - "cognito-idp:AdminSetUserPassword"
          Resource: "arn:aws:cognito-idp:${aws:region}:${aws:accountId}:userpool/${env:COGNITO_USER_POOL_ID}"

        - Effect: "Allow"
          Action:
            - "s3:PutObject"
            - "s3:GetObject"
            - "s3:DeleteObject"
          Resource: "arn:aws:s3:::${self:provider.environment.S3_BUCKET_NAME}/*"

        - Effect: "Allow"
          Action:
            - "ses:SendEmail"
            - "ses:SendRawEmail"
          Resource: "*"

        - Effect: "Allow"
          Action:
            - "scheduler:CreateSchedule"
            - "scheduler:DeleteSchedule"
            - "scheduler:GetSchedule"
          Resource: "arn:aws:scheduler:${aws:region}:${aws:accountId}:schedule/*"

        - Effect: "Allow"
          Action:
            - "iam:PassRole"
          Resource: "arn:aws:iam::${aws:accountId}:role/warrantor-scheduler-role-${sls:stage}"

functions:
  createWarranty:
    handler: src/functions/warranties/create.handler
    events:
      - httpApi:
          path: /warranties
          method: POST
          authorizer:
            name: cognitoAuthorizer

  listWarranties:
    handler: src/functions/warranties/get.handler
    events:
      - httpApi:
          path: /warranties
          method: GET
          authorizer:
            name: cognitoAuthorizer
        
  deleteWarranty:
    handler: src/functions/warranties/remove.handler
    events:
      - httpApi:
          path: /warranties/{id}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  updateWarranty:
    handler: src/functions/warranties/update.handler
    events:
      - httpApi:
          path: /warranties/{id}
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  getNotifications:
    handler: src/functions/notifications/get.handler
    events:
      - httpApi:
          path: /notifications
          method: GET
          authorizer:
            name: cognitoAuthorizer

  getSettings:
    handler: src/functions/settings/get.handler
    events:
      - httpApi:
          path: /settings
          method: GET
          authorizer:
            name: cognitoAuthorizer

  updateSettings:
    handler: src/functions/settings/update.handler
    events:
      - httpApi:
          path: /settings
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  markNotificationRead:
    handler: src/functions/notifications/update.handler
    events:
      - httpApi:
          path: /notifications/{id}
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  getUploadUrl:
    handler: src/functions/uploads/getUploadUrl.handler
    events:
      - httpApi:
          path: /uploads
          method: GET
          authorizer:
            name: cognitoAuthorizer

  dispatchNotification:
    handler: src/functions/notifications/dispatch.handler
    name: warrantor-backend-${sls:stage}-dispatch
    # No HTTP event - triggered by EventBridge Scheduler

resources:
  Resources:
    WarrantiesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: warranties
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 1
              WriteCapacityUnits: 1
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1

    NotificationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: notifications
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-createdAt-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 1
              WriteCapacityUnits: 1
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1

    SettingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: settings
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1

    UploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.S3_BUCKET_NAME}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          IgnorePublicAcls: false
          BlockPublicPolicy: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedMethods:
                - GET
                - PUT
              AllowedOrigins:
                - "*"
              AllowedHeaders:
                - "*"

    UploadsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref UploadsBucket
        PolicyDocument:
          Statement:
            - Action: s3:GetObject
              Effect: Allow
              Principal: "*"
              Resource: arn:aws:s3:::${self:provider.environment.S3_BUCKET_NAME}/*

    SchedulerRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: warrantor-scheduler-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: scheduler.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: SchedulerInvokeLambda
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: lambda:InvokeFunction
                  Resource: 
                    - arn:aws:lambda:${aws:region}:${aws:accountId}:function:warrantor-backend-${sls:stage}-*